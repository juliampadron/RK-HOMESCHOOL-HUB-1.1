<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F6B65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a46;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Title Area -->
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="#ffffff" opacity="0.95"/>
  
  <!-- Renaissance Kids Badge -->
  <circle cx="150" cy="150" r="60" fill="#FBC440"/>
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="60" text-anchor="middle" fill="#2F6B65">🎵</text>
  
  <!-- Title -->
  <text x="250" y="140" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2F6B65">Renaissance Kids</text>
  <text x="250" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#F05A22">Solfege Staircase</text>
  
  <!-- Subtitle -->
  <text x="150" y="270" font-family="Arial, sans-serif" font-size="28" fill="#1c1c1c">🎼 Climb the musical stairs!</text>
  
  <!-- Solfege Notes Staircase Visual -->
  <g transform="translate(150, 320)">
    <rect x="0" y="140" width="120" height="50" rx="10" fill="#E8F4F3" stroke="#2F6B65" stroke-width="2"/>
    <text x="60" y="172" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">DO</text>
    
    <rect x="130" y="120" width="120" height="50" rx="10" fill="#E8F4F3" stroke="#2F6B65" stroke-width="2"/>
    <text x="190" y="152" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">RE</text>
    
    <rect x="260" y="100" width="120" height="50" rx="10" fill="#E8F4F3" stroke="#2F6B65" stroke-width="2"/>
    <text x="320" y="132" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">MI</text>
    
    <rect x="390" y="80" width="120" height="50" rx="10" fill="#E8F4F3" stroke="#2F6B65" stroke-width="2"/>
    <text x="450" y="112" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">FA</text>
    
    <rect x="520" y="60" width="120" height="50" rx="10" fill="#E8F4F3" stroke="#2F6B65" stroke-width="2"/>
    <text x="580" y="92" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">SOL</text>
    
    <rect x="650" y="40" width="120" height="50" rx="10" fill="#E8F4F3" stroke="#2F6B65" stroke-width="2"/>
    <text x="710" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">LA</text>
    
    <rect x="780" y="20" width="120" height="50" rx="10" fill="#E8F4F3" stroke="#2F6B65" stroke-width="2"/>
    <text x="840" y="52" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">TI</text>
    
    <rect x="910" y="0" width="120" height="50" rx="10" fill="#FBC440" stroke="#2F6B65" stroke-width="3"/>
    <text x="970" y="32" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2F6B65">DO</text>
  </g>
  
  <!-- Footer Text -->
  <text x="150" y="560" font-family="Arial, sans-serif" font-size="22" fill="#666">A fun, interactive ear-training game for young musicians</text>
</svg>

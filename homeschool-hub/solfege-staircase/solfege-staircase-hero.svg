<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Solfège Staircase Hero Image</title>
  <desc id="desc">A colorful 3D staircase with musical notes floating upward.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ee"/>
      <stop offset="100%" stop-color="#f2eee7"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🎵 Solfege Staircase · Renaissance Kids</title>
  <meta name="title" content="🎵 Solfege Staircase · Renaissance Kids">
  <meta name="description" content="Climb the musical stairs! A fun, interactive ear-training game that helps children recognize and sing the notes of the major scale. Free from Renaissance Kids.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.renkids.org/homeschool-hub/solfege-staircase">
  <meta property="og:title" content="🎵 Solfege Staircase · Renaissance Kids">
  <meta property="og:description" content="Climb the musical stairs! A fun, interactive ear-training game that helps children recognize and sing the notes of the major scale. Free from Renaissance Kids.">
  <meta property="og:image" content="https://www.renkids.org/images/rk-solfege-share.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="🎵 Solfege Staircase · Renaissance Kids">
  <meta name="twitter:description" content="Climb the musical stairs! A fun, interactive ear-training game for young musicians.">
  <meta name="twitter:image" content="https://www.renkids.org/images/rk-solfege-share.png">
  <style>
    :root {
      --rk-teal: #2F6B65;
      --rk-peach: #F7C4A5;
      --rk-navy: #1C1C1C;
      --rk-red: #E92929;
      --rk-blue: #2B59C3;
      --rk-yellow: #FFE600;
      --rk-green: #48B749;
      --rk-purple: #8028A0;
      --rk-orange: #F05A22;
      --rk-bg: #fdfbf7;
      --rk-panel: #ffffff;
    }

    body {
      margin: 0;
      font-family: "Century Gothic", Arial, sans-serif;
      font-size: 16px;
      background: var(--rk-bg);
      color: var(--rk-navy);
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .game-container {
      width: min(860px, 100%);
      background: var(--rk-panel);
      border-radius: 12px;
      border: 2px solid rgba(28, 28, 28, 0.2);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    header {
      background: var(--rk-teal);
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 6px solid var(--rk-peach);
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 0.2px;
    }

    .brand-title {
      font-family: "Comic Sans MS", "Chalkboard", cursive;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .brand-subtitle {
      font-family: "Century Gothic", Arial, sans-serif;
      opacity: 0.95;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .brand .badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--rk-orange);
      font-size: 20px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    .score-board {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.12);
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .score-pill {
      background: var(--rk-yellow);
      color: var(--rk-navy);
      padding: 6px 12px;
      border-radius: 999px;
      border: 2px solid rgba(0, 0, 0, 0.25);
      min-width: 44px;
      text-align: center;
    }

    main {
      padding: 18px 18px 22px;
    }

    .message {
      background: #fff;
      border: 2px solid var(--rk-peach);
      border-radius: 12px;
      padding: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .play-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn {
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      background: #fff;
      color: var(--rk-teal);
      border: 2px solid var(--rk-teal);
    }

    .btn-primary {
      background: var(--rk-teal);
      color: white;
      border: 2px solid var(--rk-teal);
    }

    .staircase {
      display: grid;
      gap: 10px;
    }

    .step {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      border: 2px solid rgba(47, 107, 101, 0.25);
      background: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
      user-select: none;
    }

    .step[aria-disabled="true"] {
      opacity: 0.55;
      pointer-events: none;
    }

    .solfege {
      font-weight: 700;
      background: rgba(47, 107, 101, 0.12);
      color: var(--rk-teal);
      padding: 8px 12px;
      border-radius: 999px;
      border: 2px solid rgba(47, 107, 101, 0.2);
      min-width: 90px;
      text-align: center;
      letter-spacing: 0.6px;
    }

    .note-letter {
      font-weight: 700;
      background: rgba(247, 196, 165, 0.35);
      padding: 8px 12px;
      border-radius: 999px;
      border: 2px solid rgba(0, 0, 0, 0.14);
      min-width: 60px;
      text-align: center;
    }

    .footer-note {
      padding: 16px 18px 18px;
      color: rgba(0, 0, 0, 0.78);
      text-align: center;
      border-top: 1px solid rgba(47, 107, 101, 0.2);
      line-height: 1.5;
    }

    .footer-note .org-name {
      font-weight: 700;
    }

    .footer-note .tagline {
      font-style: italic;
    }

    @media print {
      body {
        background: white !important;
        color: black !important;
        padding: 0 !important;
      }

      .game-container {
        background: white !important;
        border: 2px solid #2F6B65 !important;
        box-shadow: none !important;
        width: 100% !important;
        max-width: 100% !important;
        border-radius: 0 !important;
      }

      .btn,
      .score-board,
      .play-row,
      .footer-note {
        display: none !important;
      }

      main {
        padding: 18px !important;
      }

      .staircase {
        margin-top: 18px;
        gap: 6px !important;
      }

      .step {
        background: white !important;
        color: black !important;
        border: 1px solid #ccc !important;
        border-left: 10px solid #2F6B65 !important;
        box-shadow: none !important;
        page-break-inside: avoid;
      }

      .solfege {
        background: #eee !important;
        color: black !important;
        border: 1px solid black !important;
      }

      .note-letter {
        background: white !important;
        border: 1px dotted #666 !important;
      }

      .message {
        border: 1px solid #2F6B65 !important;
        background: white !important;
        margin-top: 18px !important;
        min-height: 90px;
        text-align: left !important;
      }

      .message::before {
        content: "Teacher/Parent Notes:";
        font-weight: bold;
        display: block;
        margin-bottom: 10px;
      }

      header::before {
        content: "Student Name: __________________________  Date: ____________";
        display: block;
        margin-bottom: 10px;
        font-weight: bold;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <header>
      <div class="brand">
        <div class="badge" aria-hidden="true">🎵</div>
        <div>
          <div class="brand-title">Renaissance Kids</div>
          <div class="brand-subtitle">Solfege Staircase</div>
        </div>
      </div>
      <div class="score-board" aria-label="Score">
        ⭐ Stars
        <span id="scoreDisplay" class="score-pill">0</span>
      </div>
    </header>
    <main>
      <div id="messageBox" class="message">Press <b>PLAY NOTE</b>, then click the matching step.</div>
      <div class="play-row">
        <button id="playBtn" class="btn btn-primary">▶ PLAY NOTE</button>
        <button id="resetBtn" class="btn">↺ Reset Stars</button>
        <button class="btn" onclick="window.print()">🖨 Print Worksheet</button>
      </div>
      <div id="staircase" class="staircase" aria-label="Solfege staircase"></div>
    </main>
    <div class="footer-note">
      <div class="org-name">Renaissance Kids, Inc.</div>
      <div>1343 Route 44, Pleasant Valley, NY 12569</div>
      <div>(845) 452-4225 | info@renkids.org</div>
      <div class="tagline">“Light up learning through the arts.“™</div>
    </div>
  </div>
  <script>
    const steps=[{solfege:"DO",letter:"C",freq:261.63},{solfege:"RE",letter:"D",freq:293.66},{solfege:"MI",letter:"E",freq:329.63},{solfege:"FA",letter:"F",freq:349.23},{solfege:"SOL",letter:"G",freq:392.00},{solfege:"LA",letter:"A",freq:440.00},{solfege:"TI",letter:"B",freq:493.88},{solfege:"DO",letter:"C",freq:523.25}];
    let currentNoteIndex=null;let stepsEnabled=false;
    let score=parseInt(localStorage.getItem('rk_solfegeScore'),10);if(Number.isNaN(score))score=0;
    const staircase=document.getElementById("staircase");const messageBox=document.getElementById("messageBox");const scoreDisplay=document.getElementById("scoreDisplay");const playBtn=document.getElementById("playBtn");const resetBtn=document.getElementById("resetBtn");
    let audioCtx=null;
    function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();}
    function playTone(freq,duration=0.7){ensureAudio();const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.type="sine";osc.frequency.value=freq;gain.gain.setValueAtTime(0.0001,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.35,audioCtx.currentTime+0.02);gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration);osc.connect(gain);gain.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+duration);}
    function renderStaircase(){staircase.innerHTML="";steps.forEach((s,idx)=>{const step=document.createElement("div");step.className="step";step.setAttribute("role","button");step.setAttribute("tabindex","0");step.setAttribute("aria-label","Step "+(idx+1)+": "+s.solfege+" ("+s.letter+")");step.dataset.index=idx;const left=document.createElement("div");left.className="solfege";left.textContent=s.solfege;const right=document.createElement("div");right.className="note-letter";right.textContent=s.letter;step.appendChild(left);step.appendChild(right);step.addEventListener("click",()=>handleStepClick(idx));step.addEventListener("keydown",(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();handleStepClick(idx);}});staircase.appendChild(step);});disableSteps(true);}
    function disableSteps(disabled){const children=staircase.querySelectorAll(".step");children.forEach(el=>{el.setAttribute("aria-disabled",disabled?"true":"false");});}
    function chooseNewNote(){currentNoteIndex=Math.floor(Math.random()*steps.length);stepsEnabled=true;disableSteps(false);playTone(steps[currentNoteIndex].freq);messageBox.innerHTML="Listen carefully… then click the matching step!";}
    function handleStepClick(clickedIndex){if(!stepsEnabled||currentNoteIndex===null)return;if(clickedIndex===currentNoteIndex){score++;scoreDisplay.innerText=String(score);localStorage.setItem('rk_solfegeScore',String(score));messageBox.innerText="✅ CORRECT! That was "+steps[currentNoteIndex].solfege+" ("+steps[currentNoteIndex].letter+"). Great ear!";disableSteps(true);stepsEnabled=false;currentNoteIndex=null;}else{messageBox.innerText="Try again — listen once more, then choose the step that matches.";playTone(steps[currentNoteIndex].freq,0.6);}}
    function resetScore(){score=0;scoreDisplay.innerText='0';localStorage.setItem('rk_solfegeScore','0');messageBox.innerText="✨ Score reset. Let's start a new climb!";disableSteps(true);stepsEnabled=false;currentNoteIndex=null;}
    document.addEventListener("DOMContentLoaded",()=>{scoreDisplay.innerText=String(score);if(score>0){messageBox.innerText="👋 Welcome back! You have "+score+" stars. Press PLAY NOTE to keep climbing!";}});
    playBtn.addEventListener("click",chooseNewNote);resetBtn.addEventListener("click",resetScore);renderStaircase();
  </script>
</body>
</html>
